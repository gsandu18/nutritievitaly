name: Deploy to GitHub Pages

# Rulează la fiecare push pe ramura principală (schimbă în "master" dacă așa se numește la tine)
on:
  push:
    branches: [ main ]
  workflow_dispatch:   # îți permite să o pornești manual din tab-ul Actions

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci || npm install

      - name: Build
        run: npm run build

      - name: Detect build output (Vite=dist, CRA=build)
        run: |
          if [ -d dist ]; then echo "OUT=dist" >> "$GITHUB_ENV";
          elif [ -d build ]; then echo "OUT=build" >> "$GITHUB_ENV";
          else echo "Nu am găsit nici 'dist', nici 'build'. Verifică scriptul de build."; exit 1; fi
          echo "Folder publicat: $OUT"

      - name: SPA fallback (404 -> index.html)
        run: cp "$OUT/index.html" "$OUT/404.html"

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.OUT }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
