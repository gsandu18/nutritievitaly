<!DOCTYPE html>

<html lang="ro"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Setează Parolă Nouă - Vitality</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>

                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",

                        "xl": "0.75rem",
                        "full": "9999px"

                    "spacing": {

<style>
    body {
      min-height: max(884px, 100dvh);
    }

  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col items-center justify-center font-body-md antialiased p-margin-mobile">
<!-- Brand Anchor -->
<div class="mb-lg text-center">
<h1 class="font-headline-lg text-headline-lg text-primary">Vitality</h1>
</div>
<!-- Main Card -->
<main class="w-full max-w-md bg-surface-container-lowest rounded-xl shadow-[0_4px_20px_0_rgba(0,0,0,0.04)] p-lg border border-surface-variant">
<!-- Header -->
<div class="mb-md text-center">
<h2 class="font-headline-md text-headline-md text-on-surface mb-base">Setează Parolă Nouă</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Introdu noua ta parolă mai jos pentru a-ți asigura accesul.</p>
</div>
<!-- Form -->
<form class="flex flex-col gap-md">
<!-- Input: Parolă Nouă -->
<div class="relative">
<label class="block font-label-md text-label-md text-on-surface mb-xs" for="new-password">Parolă Nouă</label>
<div class="relative">
<input class="w-full h-12 bg-surface-container-low border-none rounded focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest px-sm pr-12 text-on-surface font-body-md transition-colors" id="new-password" name="new-password" placeholder="••••••••" required="" type="password"/>
<button class="absolute inset-y-0 right-0 px-sm flex items-center text-on-surface-variant hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">visibility_off</span>
</button>
</div>
</div>
<!-- Input: Confirmă Parolă -->
<div class="relative">
<label class="block font-label-md text-label-md text-on-surface mb-xs" for="confirm-password">Confirmă Parolă</label>
<div class="relative">
<input class="w-full h-12 bg-surface-container-low border-none rounded focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest px-sm pr-12 text-on-surface font-body-md transition-colors" id="confirm-password" name="confirm-password" placeholder="••••••••" required="" type="password"/>
<button class="absolute inset-y-0 right-0 px-sm flex items-center text-on-surface-variant hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">visibility_off</span>
</button>
</div>
</div>
<!-- Password Requirements -->
<div class="bg-surface-container-low rounded-lg p-sm mt-xs">
<p class="font-label-sm text-label-sm text-on-surface mb-base">Cerințe parolă:</p>
<ul class="flex flex-col gap-xs">
<li class="flex items-center gap-xs text-on-surface-variant">
<span class="material-symbols-outlined text-[16px]">radio_button_unchecked</span>
<span class="font-label-sm text-label-sm">Minim 8 caractere</span>
</li>
<li class="flex items-center gap-xs text-on-surface-variant">
<span class="material-symbols-outlined text-[16px]">radio_button_unchecked</span>
<span class="font-label-sm text-label-sm">Cel puțin o cifră</span>
</li>
<li class="flex items-center gap-xs text-on-surface-variant">
<span class="material-symbols-outlined text-[16px]">radio_button_unchecked</span>
<span class="font-label-sm text-label-sm">Cel puțin o literă mare</span>
</li>
</ul>
</div>
<!-- Submit Action -->
<button class="w-full h-12 bg-primary text-on-primary font-label-md text-label-md rounded flex items-center justify-center hover:bg-surface-tint transition-colors mt-xs shadow-sm" type="submit">
                Salvează Parola
            </button>
</form>
<!-- Back to login -->
<div class="mt-md text-center">
<a class="font-label-sm text-label-sm text-primary hover:text-surface-tint transition-colors" href="#">Înapoi la autentificare</a>
</div>
</main>
</body></html>
