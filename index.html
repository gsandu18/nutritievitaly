<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriChef Pro | Înregistrare</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-md mx-auto">
        <!-- Header -->
        <div class="flex items-center justify-between mb-8">
            <div class="flex items-center gap-2">
                <div class="w-10 h-10 rounded-xl bg-dark-900 flex items-center justify-center text-primary-500">
                    <span class="material-symbols-rounded">restaurant</span>
                </div>
                <span class="text-xl font-bold">NutriChef <span class="text-primary-600">Pro</span></span>
            </div>
            <a href="#" class="text-sm font-bold text-slate-500">Înapoi</a>
        </div>

        <!-- Butoane Principale -->
        <div class="space-y-4 mb-10">
            <button onclick="openModal('modal-reg-nutri')" class="w-full py-4 bg-primary-600 hover:bg-primary-700 text-white rounded-2xl font-bold transition-all flex items-center justify-center gap-2">
                Sunt Nutriționist <span class="material-symbols-rounded">arrow_forward</span>
            </button>
            <button onclick="openModal('modal-reg-pacient')" class="w-full py-4 bg-white border border-slate-200 hover:border-slate-300 rounded-2xl font-bold transition-all flex items-center justify-center gap-2">
                Sunt Pacient <span class="material-symbols-rounded">person_add</span>
            </button>
        </div>

        <!-- Placeholder pentru image_2.png -->
        <div class="bg-white p-4 rounded-3xl shadow-sm border border-slate-200">
            <div class="h-48 bg-slate-100 rounded-2xl flex flex-col items-center justify-center text-slate-400 border-2 border-dashed border-slate-200">
                <span class="material-symbols-rounded text-4xl mb-2">image_not_supported</span>
                <p class="text-sm font-medium">NutriChef Platform Interface</p>
            </div>
        </div>
    </div>

    <!-- MODAL NUTRIȚIONIST -->
    <div id="modal-reg-nutri" class="fixed inset-0 bg-black/50 hidden items-center justify-center p-4 z-50">
        <div class="bg-white w-full max-w-lg rounded-3xl p-6 max-h-[90vh] overflow-y-auto">
            <h2 class="text-xl font-bold mb-4">Înregistrare Nutriționist (Pachet Gratuit 1 lună)</h2>
            <form class="space-y-4">
                <input type="text" placeholder="Nume Complet" class="w-full p-3 border rounded-xl">
                <input type="email" placeholder="Email Profesional" class="w-full p-3 border rounded-xl">
                <input type="text" placeholder="Cod Parafă / Certificat" class="w-full p-3 border rounded-xl">
                <input type="password" placeholder="Parolă" class="w-full p-3 border rounded-xl">
                <button type="button" onclick="alert('Cont creat! Ai primit 30 zile gratuit.')" class="w-full py-3 bg-primary-600 text-white rounded-xl font-bold">Creează Cont</button>
            </form>
            <button onclick="closeModal('modal-reg-nutri')" class="mt-4 text-sm text-slate-500 w-full">Anulează</button>
        </div>
    </div>

    <!-- MODAL PACIENT -->
    <div id="modal-reg-pacient" class="fixed inset-0 bg-black/50 hidden items-center justify-center p-4 z-50">
        <div class="bg-white w-full max-w-lg rounded-3xl p-6 max-h-[90vh] overflow-y-auto">
            <h2 class="text-xl font-bold mb-4">Înregistrare Pacient</h2>
            <form class="space-y-4">
                <input type="text" placeholder="Nume Complet" class="w-full p-3 border rounded-xl">
                <input type="number" placeholder="Vârstă" class="w-full p-3 border rounded-xl">
                <input type="number" placeholder="Greutate (kg)" class="w-full p-3 border rounded-xl">
                <select class="w-full p-3 border rounded-xl">
                    <option>Obiectiv: Slăbire</option>
                    <option>Obiectiv: Masă Musculară</option>
                </select>
                <input type="password" placeholder="Parolă" class="w-full p-3 border rounded-xl">
                <button type="button" onclick="alert('Cont pacient creat!')" class="w-full py-3 bg-primary-600 text-white rounded-xl font-bold">Creează Cont</button>
            </form>
            <button onclick="closeModal('modal-reg-pacient')" class="mt-4 text-sm text-slate-500 w-full">Anulează</button>
        </div>
    </div>

    <script>
        function openModal(id) { document.getElementById(id).classList.remove('hidden'); document.getElementById(id).classList.add('flex'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
    </script>
</body>
</html>
