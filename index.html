<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noura.</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,600&family=DM+Sans:wght@300;400;500&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--forest:#0F2E28;--forestd:#0a1f1b;--forest2:#1a3d36;--sage:#1D9E75;--mint:#5DCAA5;--mintl:#E1F5EE;--saffron:#EF9F27;--saffl:#FAEEDA;--linen:#FAFAF8;--linend:#F1EFE8;--gray:#888780;--dark:#2C2C2A;--white:#FFFFFF;--red:#D85A30;--redl:#FAECE7;--purple:#AFA9EC;--purpll:#EEEDFE;}
html,body{height:100%;font-family:'DM Sans',system-ui,sans-serif;font-weight:300;color:var(--dark);overflow:hidden;}
#spa-loading{position:fixed;inset:0;background:var(--forest);display:flex;align-items:center;justify-content:center;z-index:9998;transition:opacity .5s;}
#spa-loading.gone{opacity:0;pointer-events:none;}
.load-logo{font-family:'Cormorant Garamond',Georgia,serif;font-size:52px;font-weight:600;color:#E1F5EE;letter-spacing:.02em;animation:lp 1.4s ease-in-out infinite;}
.load-logo span{color:var(--sage);}
@keyframes lp{0%,100%{opacity:.4;}50%{opacity:1;}}
#spa-root{width:100%;height:100vh;overflow:hidden;}
.page-enter{animation:pi .2s ease forwards;}
@keyframes pi{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
#g-sidebar{width:220px;background:var(--forest);display:flex;flex-direction:column;height:100vh;flex-shrink:0;}
.g-logo{font-family:'Cormorant Garamond',Georgia,serif;font-size:26px;font-weight:600;color:#E1F5EE;padding:26px 22px 20px;letter-spacing:.02em;cursor:pointer;border-bottom:.5px solid rgba(29,158,117,.12);flex-shrink:0;}
.g-logo span{color:var(--sage);}
.g-nav{flex:1;overflow-y:auto;padding:8px 0;}
.g-sec{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:rgba(93,202,165,.38);padding:14px 22px 5px;font-weight:500;}
.g-item{display:flex;align-items:center;gap:11px;padding:11px 22px;font-size:14px;color:rgba(159,225,203,.5);cursor:pointer;border-left:2.5px solid transparent;transition:all .15s;}
.g-item:hover{background:rgba(29,158,117,.1);color:rgba(225,245,238,.8);}
.g-item.active{background:rgba(29,158,117,.15);color:#E1F5EE;border-left-color:var(--sage);font-weight:500;}
.g-ico{width:15px;height:15px;border:1.5px solid currentColor;border-radius:3px;opacity:.6;flex-shrink:0;}
.g-item.active .g-ico{opacity:1;}
.g-badge{margin-left:auto;background:rgba(239,159,39,.3);color:var(--saffron);font-size:10px;padding:2px 6px;border-radius:20px;font-weight:500;}
.g-user{padding:14px 18px;border-top:.5px solid rgba(29,158,117,.14);display:flex;align-items:center;gap:9px;flex-shrink:0;cursor:pointer;}
.g-user:hover{background:rgba(29,158,117,.07);}
.g-av{width:32px;height:32px;border-radius:50%;background:rgba(29,158,117,.2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:var(--mint);flex-shrink:0;}
.g-uname{font-size:12px;color:rgba(225,245,238,.8);}
.g-urole{font-size:10px;color:rgba(93,202,165,.4);}
#g-pubnav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(250,250,248,.93);backdrop-filter:blur(12px);border-bottom:.5px solid rgba(15,46,40,.1);display:flex;align-items:center;justify-content:space-between;padding:0 3rem;height:64px;}
.pn-logo{font-family:'Cormorant Garamond',Georgia,serif;font-size:24px;font-weight:600;color:var(--forest);cursor:pointer;letter-spacing:.02em;}
.pn-logo span{color:var(--sage);}
.pn-links{display:flex;align-items:center;gap:2rem;}
.pn-link{font-size:13px;color:var(--gray);cursor:pointer;transition:color .2s;}
.pn-link:hover,.pn-link.active{color:var(--forest);font-weight:500;}
.pn-cta{background:var(--forest)!important;color:var(--linen)!important;padding:8px 20px;border-radius:6px;font-weight:500!important;}
.pn-cta:hover{background:var(--sage)!important;}
.app-shell{display:flex;height:100vh;overflow:hidden;}
.app-content{flex:1;overflow:hidden;min-width:0;}
.pub-shell{height:100vh;overflow-y:auto;overflow-x:hidden;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-thumb{background:rgba(15,46,40,.15);border-radius:2px;}
#g-toast{position:fixed;bottom:20px;right:16px;left:16px;max-width:360px;margin:0 auto;background:var(--forest);color:#E1F5EE;padding:11px 20px;border-radius:10px;font-size:13px;box-shadow:0 8px 24px rgba(15,46,40,.25);transform:translateY(80px);transition:transform .3s;z-index:10000;pointer-events:none;text-align:center;}
#g-toast.show{transform:translateY(0);}

/* App hamburger — hidden on landing */
#mob-btn{display:none;position:fixed;top:10px;left:10px;z-index:9997;width:40px;height:40px;background:var(--forest);border:none;border-radius:9px;cursor:pointer;flex-direction:column;align-items:center;justify-content:center;gap:5px;box-shadow:0 2px 12px rgba(0,0,0,.3);}
#mob-btn span{display:block;width:18px;height:2px;background:#E1F5EE;border-radius:2px;}
#mob-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9995;}
@media(max-width:768px){
  /* App pages: show hamburger */
  .app-active #mob-btn{display:flex!important;}
  .app-shell{position:relative;}
  #g-sidebar{position:fixed;top:0;left:0;bottom:0;z-index:9996;width:260px;transform:translateX(-100%);transition:transform .28s cubic-bezier(.4,0,.2,1);box-shadow:4px 0 24px rgba(0,0,0,.3);}
  #g-sidebar.open{transform:translateX(0);}
  #mob-ov.open{display:block;}
  .app-content{width:100%!important;}
  /* Non-landing public pages: show global nav */
  #g-pubnav{padding:0 1rem!important;}
  .pn-links span:not(.pn-cta){display:none!important;}
  /* Common app responsive */
  .db-topbar{padding-left:52px!important;}
  .kpi-row{grid-template-columns:1fr 1fr!important;}
  .g2,.g3{grid-template-columns:1fr!important;}
  .topbar{padding-left:52px!important;flex-wrap:wrap!important;height:auto!important;min-height:54px!important;padding-top:8px!important;padding-bottom:8px!important;gap:6px!important;}
  .grid2{grid-template-columns:1fr!important;}
  .grid3{grid-template-columns:1fr 1fr!important;}
  .main{display:flex!important;flex-direction:column!important;overflow:hidden!important;height:100%!important;}
  .thread-col{width:100%!important;flex-shrink:0!important;max-height:48px!important;overflow:hidden!important;border-right:none!important;border-bottom:.5px solid rgba(15,46,40,.1)!important;transition:max-height .3s!important;}
  .thread-col.mob-open{max-height:52vh!important;overflow-y:auto!important;}
  .filter-tabs,.thread-list{display:none!important;}
  .thread-col.mob-open .filter-tabs{display:flex!important;}
  .thread-col.mob-open .thread-list{display:block!important;}
  .tc-top{cursor:pointer!important;padding-left:52px!important;}
  .chat-col{flex:1!important;display:flex!important;flex-direction:column!important;overflow:hidden!important;min-height:0!important;}
  .chat-header{flex-shrink:0!important;height:48px!important;padding:0 12px 0 52px!important;}
  .ch-sub,.ch-btn:not(.primary){display:none!important;}
  .chat-scroll{flex:1!important;overflow-y:auto!important;min-height:0!important;padding:10px 12px!important;}
  .chat-input{flex-shrink:0!important;padding:10px 12px!important;padding-bottom:max(10px,env(safe-area-inset-bottom))!important;}
  .ci-row{display:flex!important;gap:8px!important;align-items:flex-end!important;}
  .ci-ta{flex:1!important;font-size:15px!important;min-height:44px!important;}
  .ci-send{width:44px!important;height:44px!important;flex-shrink:0!important;}
  .ci-actions{overflow-x:auto!important;display:flex!important;gap:6px!important;margin-top:6px!important;}
  .ci-action{white-space:nowrap!important;flex-shrink:0!important;font-size:11px!important;}
  .right-col,.info-col{display:none!important;}
}
@media(min-width:769px){#mob-btn{display:none!important;}}
</style>
</head>

<script>

var _C={},cur=null,_tt=null;
var _PFN=["setFilter","selectClient","renderList","renderDetail","filterFoods","addFoodToCell",
  "removeItem","switchTab","loadTemplate","clearPlan","savePlan","changeWeek","cycleClient",
  "selectRecipe","togglePortions","startCooking","closeCooking","renderCookStep","cookStep",
  "sendMsg","selectThread","approve","reject","selectReport","filterPosts","openPost",
  "goTo","selectRole","toggleTag","addInvite","removeInvite","renderFoods","renderRecipe",

  "renderInvited","buildSummary","searchClients","toggleLandingNav"];

function cleanFns(){for(var i=0;i<_PFN.length;i++){try{delete window[_PFN[i]];}catch(e){}}}

function toggleSb(){
  var sb=document.getElementById("g-sidebar"),ov=document.getElementById("mob-ov");
  if(sb){sb.classList.toggle("open");if(ov)ov.classList.toggle("open");}
}
function closeSb(){
  var sb=document.getElementById("g-sidebar"),ov=document.getElementById("mob-ov");
  if(sb)sb.classList.remove("open");if(ov)ov.classList.remove("open");
}

document.addEventListener("click",function(e){
  var el=e.target;
  while(el&&el!==document.body){
    var r=el.getAttribute("data-nav");
    if(r!==null){e.preventDefault();closeSb();window.navigate(r);return;}
    el=el.parentElement;
  }
});

function getPage(r){
  if(_C[r])return _C[r];if(!PAGES_B64[r])return null;
  try{var p=JSON.parse(atob(PAGES_B64[r]));_C[r]=p;return p;}
  catch(e){console.warn("page["+r+"]:",e.message);return null;}
}

window.showToast=function(m){
  var t=document.getElementById("g-toast");
  t.textContent=m;t.classList.add("show");
  clearTimeout(_tt);_tt=setTimeout(function(){t.classList.remove("show");},2500);
};

window.navigate=function(r,push){
  if(push===undefined)push=true;
  if(!r)r="landing";
  if(r===cur)return;
  cur=r;
  if(push&&!IN_IFRAME){try{history.pushState({r:r},"","#"+r);}catch(e){}}
  doRender(r);
};

window.addEventListener("popstate",function(e){
  var r=(e.state&&e.state.r!==undefined)?e.state.r:(location.hash.slice(1)||"landing");
  cur=null; window.navigate(r,false);
});

function updSb(r){var a=document.querySelectorAll(".g-item");for(var i=0;i<a.length;i++)a[i].classList.toggle("active",a[i].getAttribute("data-nav")===r);}
function updPub(r){var a=document.querySelectorAll(".pn-link");for(var i=0;i<a.length;i++)a[i].classList.toggle("active",a[i].getAttribute("data-nav")===r);}

function doRender(r){
  var root=document.getElementById("spa-root");
  var isApp=APP.indexOf(r)!==-1;
  var isLanding=(r==="landing"||r===""); var isLogin=(r==="login");

  // Toggle hamburger visibility: only on app pages
  document.body.classList.toggle("app-active", isApp);

  if(isApp){
    // Always rebuild sidebar to ensure all menu items are current
    if(!document.getElementById("app-shell-wrap")||!document.getElementById("app-shell-wrap").querySelector('[data-nav="recipe-studio"]')){
      root.innerHTML=mkAS();
    }
    updSb(r);
    inject(r,document.getElementById("app-main-content"));
  } else if(isLanding||isLogin){
    root.innerHTML='<div class="pub-shell" style="padding-top:0"><div id="pub-content"></div></div>';
    inject(r,document.getElementById("pub-content"));
  } else {
    root.innerHTML=mkPS(r);
    inject(r,document.getElementById("pub-content"));
    updPub(r);
  }
}

function mkPS(r){
  var nav=[["landing","Acasă"],["how-it-works","Cum funcționează"],["pricing","Prețuri"],["blog","Blog"]];

function inject(r,c){
  cleanFns();
  var p=getPage(r);
  if(!p){c.innerHTML='<div style="padding:3rem;color:#888;font-size:14px">Pagina "'+r+'" nu există.</div>';return;}
  var o=document.querySelectorAll("[data-ps]");for(var i=0;i<o.length;i++)o[i].remove();
  if(p.css){var s=document.createElement("style");s.setAttribute("data-ps","1");s.textContent=p.css;document.head.appendChild(s);}
  var isA=APP.indexOf(r)!==-1;
  var w=document.createElement("div");w.className="page-enter";
  w.style.cssText="height:100%;overflow:"+(isA?"hidden":"auto")+";";
  w.innerHTML=p.html;c.innerHTML="";c.appendChild(w);
  if(p.js&&p.js.trim()){try{(new Function(p.js))();}catch(e){console.warn("["+r+"]",e.message);}}
  if(window.innerWidth<=768&&r==="colaborare"){
    var tc=document.querySelector(".thread-col"),tct=document.querySelector(".tc-top");
    if(tct&&tc)tct.onclick=function(){tc.classList.toggle("mob-open");};
  }
}

document.addEventListener("DOMContentLoaded",function(){
  setTimeout(function(){
    document.getElementById("spa-loading").classList.add("gone");
    var start=location.hash.slice(1)||"landing";
    window.navigate(start,false);
  },800);
});
