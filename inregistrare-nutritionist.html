<!DOCTYPE html>
<html lang="ro" class="h-full bg-slate-50">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriChef Pro | Înregistrare Profesională</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .form-card { @apply bg-white p-8 md:p-10 rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-slate-100; }
        .input-group { @apply space-y-1.5; }
        .input-label { @apply text-[11px] font-bold text-slate-400 uppercase tracking-wider; }
        .input-field { @apply w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3.5 text-sm font-medium focus:ring-2 focus:ring-primary-500/20 focus:border-primary-500 outline-none transition-all; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 bg-slate-50">

    <div class="w-full max-w-2xl">
        <div class="text-center mb-10">
            <div class="inline-flex items-center gap-2 mb-4">
                <div class="w-10 h-10 rounded-xl bg-dark-900 flex items-center justify-center">
                    <span class="material-symbols-rounded text-primary-500">restaurant</span>
                </div>
                <span class="text-2xl font-bold tracking-tighter text-slate-900">NutriChef Pro</span>
            </div>
            <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Activează Contul Profesional</h1>
            <p class="text-slate-500 mt-2 font-medium">30 de zile gratuit pentru a testa platforma NutriChef.</p>
        </div>

        <form id="reg-form" class="form-card space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="input-group">
                    <label class="input-label">Nume Complet</label>
                    <input type="text" id="name" required class="input-field" placeholder="Ex: Dr. Popescu Ana">
                </div>
                <div class="input-group">
                    <label class="input-label">Specializare</label>
                    <input type="text" id="specializare" required class="input-field" placeholder="Ex: Nutriție Clinică">
                </div>
            </div>

            <div class="input-group">
                <label class="input-label">Adresă Email</label>
                <input type="email" id="email" required class="input-field" placeholder="nume@clinica.ro">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="input-group">
                    <label class="input-label">Parolă</label>
                    <input type="password" id="password" required class="input-field" placeholder="••••••••">
                </div>
                <div class="input-group">
                    <label class="input-label">Nr. Aviz Liberă Practică</label>
                    <input type="text" id="aviz" required class="input-field" placeholder="RO-123456">
                </div>
            </div>

            <div class="input-group">
                <label class="input-label">Documente Verificare</label>
                <div class="border-2 border-dashed border-slate-200 p-6 rounded-2xl flex flex-col items-center justify-center text-center cursor-pointer bg-slate-50 hover:border-primary-500 transition-all">
                    <span class="material-symbols-rounded text-slate-400 text-3xl mb-2">upload_file</span>
                    <p class="text-sm font-bold text-slate-700">Încarcă Aviz/Diplomă (PDF)</p>
                    <input type="file" id="file-upload" class="hidden">
                </div>
            </div>

            <button type="submit" class="w-full bg-slate-900 hover:bg-slate-800 text-white py-4 rounded-2xl font-bold transition-all shadow-lg hover:shadow-xl active:scale-[0.98]">
                Activează Contul (30 Zile Gratuit)
            </button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-storage.js";

        // Config Firebase (Inserează datele tale)
        const firebaseConfig = { /* ... */ };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);

        document.getElementById('reg-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                const cred = await createUserWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value);
                
                // Upload document
                const file = document.getElementById('file-upload').files[0];
                if(file) await uploadBytes(ref(storage, 'documente/' + cred.user.uid), file);

                // Salvare date
                await setDoc(doc(db, "User", cred.user.uid), {
                    nume: document.getElementById('name').value,
                    rol: 'nutritionist',
                    aviz: document.getElementById('aviz').value,
                    status: 'trial_activ',
                    dataStart: new Date()
                });
                window.location.href = "dashboard-nutritionist.html";
            } catch (err) { alert("Eroare: " + err.message); }
        });
    </script>
</body>
</html>
