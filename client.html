<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noura. — Clienții mei</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --forest:  #0F2E28;
  --sage:    #1D9E75;
  --mint:    #5DCAA5;
  --mintl:   #E1F5EE;
  --saffron: #EF9F27;
  --saffl:   #FAEEDA;
  --linen:   #FAFAF8;
  --linend:  #F1EFE8;
  --gray:    #888780;
  --dark:    #2C2C2A;
  --white:   #FFFFFF;
  --red:     #D85A30;
  --redl:    #FAECE7;
  --purple:  #AFA9EC;
  --purpll:  #EEEDFE;
}

html, body { height: 100%; font-family: 'DM Sans', sans-serif; font-weight: 300; background: var(--linen); color: var(--dark); overflow: hidden;}

/* APP LAYOUT - DESKTOP */
.app {
  display: grid;
  grid-template-columns: 220px 340px 1fr;
  height: 100vh;
  overflow: hidden;
  position: relative;
}

/* ─── OVERLAY MENIU MOBIL ─── */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 40; }

/* ─── TOPBAR PENTRU MOBIL ─── */
.mobile-topbar {
  display: none;
  background: var(--white);
  border-bottom: 1px solid rgba(15,46,40,.08);
  padding: 12px 16px;
  align-items: center;
  justify-content: space-between;
  z-index: 20;
}
.mobile-topbar-title {
  font-size: 16px;
  font-weight: 500;
  color: var(--dark);
}
.menu-toggle {
  background: none;
  border: none;
  font-size: 24px;
  color: var(--dark);
  cursor: pointer;
}

/* ─── SIDEBAR ─────────────────────────────────────── */
.sidebar {
  background: var(--forest);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  z-index: 50;
  transition: transform 0.3s ease;
}
.sb-logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 28px;
  font-weight: 600;
  color: #E1F5EE;
  letter-spacing: .02em;
  padding: 28px 24px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.sb-logo span { color: var(--sage); }
.close-menu { display: none; color: #E1F5EE; font-size: 24px; cursor: pointer; background: none; border: none; }

.sb-nav { padding: 8px 0; flex: 1; overflow-y: auto; }
.sb-section {
  font-size: 11px;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: rgba(93,202,165,.4);
  padding: 16px 24px 6px;
  font-weight: 500;
}
.sb-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 11px 24px;
  font-size: 14px;
  color: rgba(159,225,203,.5);
  cursor: pointer;
  border-left: 2.5px solid transparent;
  transition: all .15s;
}
.sb-item:hover { background: rgba(29,158,117,.1); color: rgba(225,245,238,.8); }
.sb-item.active {
  background: rgba(29,158,117,.12);
  color: #E1F5EE;
  border-left-color: var(--sage);
  font-weight: 500;
}
.sb-item .sb-icon {
  width: 18px;
  height: 18px;
  border: 1.5px solid currentColor;
  border-radius: 3px;
  opacity: .6;
  flex-shrink: 0;
}
.sb-item.active .sb-icon { opacity: 1; }
.sb-badge {
  margin-left: auto;
  background: rgba(239,159,39,.3);
  color: var(--saffron);
  font-size: 11px;
  padding: 2px 7px;
  border-radius: 20px;
  font-weight: 500;
}

.sb-user {
  padding: 16px 20px;
  border-top: 0.5px solid rgba(29,158,117,.15);
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}
.sb-av {
  width: 34px; height: 34px;
  border-radius: 50%;
  background: rgba(29,158,117,.2);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 500; color: var(--mint);
  flex-shrink: 0;
}
.sb-uname { font-size: 13px; color: rgba(225,245,238,.8); font-weight: 400; line-height: 1.2;}
.sb-urole { font-size: 11px; color: rgba(93,202,165,.45); text-transform: capitalize; }

/* ─── LIST COLUMN ─────────────────────────────────── */
.list-col {
  background: var(--white);
  border-right: 1px solid rgba(15,46,40,.08);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  z-index: 10;
}

.lc-header {
  padding: 20px 18px 14px;
  border-bottom: 1px solid rgba(15,46,40,.08);
  flex-shrink: 0;
}
.lc-toprow {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}
.lc-title {
  font-size: 16px;
  font-weight: 500;
  color: var(--dark);
}
.lc-title span {
  font-size: 13px;
  color: var(--gray);
  font-weight: 300;
}
.btn-new {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--forest);
  color: var(--linen);
  padding: 9px 16px;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  border: none;
  font-family: inherit;
  transition: background .2s;
}
.btn-new:hover { background: var(--sage); }
.btn-new .ico {
  width: 14px; height: 14px;
  border: 1.5px solid currentColor;
  border-radius: 2px;
  position: relative;
  flex-shrink: 0;
}
.btn-new .arr { font-size: 11px; }

.search-wrap { position: relative; margin-bottom: 10px; }
.search-in {
  width: 100%;
  padding: 10px 14px 10px 36px;
  font-size: 13px;
  border: 1px solid rgba(15,46,40,.14);
  border-radius: 8px;
  font-family: inherit;
  color: var(--dark);
  background: var(--linen);
  outline: none;
}
.search-in:focus { border-color: var(--sage); }
.search-ico {
  position: absolute;
  left: 12px; top: 50%;
  transform: translateY(-50%);
  color: var(--gray);
  font-size: 14px;
  line-height: 1;
  pointer-events: none;
}

.filter-row { display: flex; gap: 6px; flex-wrap: wrap; }
.fp {
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid rgba(15,46,40,.15);
  font-size: 12px;
  color: var(--gray);
  cursor: pointer;
  transition: all .15s;
  background: var(--white);
}
.fp.on { background: var(--dark); color: var(--white); border-color: var(--dark); }
.fp:hover:not(.on) { border-color: var(--sage); color: var(--sage); }

.clients-list { flex: 1; overflow-y: auto; }
.ci {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 18px;
  border-bottom: 1px solid rgba(15,46,40,.06);
  cursor: pointer;
  transition: background .1s;
}
.ci:hover { background: var(--linen); }
.ci.selected { background: #E8F7F2; }
.ci-av {
  width: 38px; height: 38px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 500;
  flex-shrink: 0;
}
.ci-info { flex: 1; min-width: 0; }
.ci-name {
  font-size: 14px;
  font-weight: 500;
  color: var(--dark);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.ci-meta { font-size: 11px; color: var(--gray); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
.ci-right { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; flex-shrink: 0; }
.ci-badge {
  font-size: 10px;
  padding: 3px 9px;
  border-radius: 20px;
  font-weight: 500;
  white-space: nowrap;
}
.b-ok    { background: var(--mintl); color: #085041; }
.b-exc   { background: var(--mintl); color: #085041; }
.b-warn  { background: var(--saffl); color: #633806; }
.b-new   { background: var(--purpll); color: #3C3489; }
.b-exp   { background: var(--redl); color: #712B13; }
.ci-bar-wrap { width: 56px; }
.ci-bar-bg { height: 3px; background: rgba(15,46,40,.1); border-radius: 2px; overflow: hidden; }
.ci-bar-fill { height: 100%; border-radius: 2px; }
.ci-pct { font-size: 10px; color: var(--gray); text-align: right; margin-top: 2px; }
.more-row { text-align: center; padding: 14px; font-size: 12px; color: var(--gray); cursor: pointer; }
.more-row:hover { color: var(--sage); }

/* ─── DETAIL COLUMN ───────────────────────────────── */
.detail-col {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--linen);
  transition: transform 0.3s ease;
}
.dc-topbar {
  background: var(--white);
  border-bottom: 1px solid rgba(15,46,40,.08);
  padding: 0 24px;
  height: 60px;
  display: flex;
  align-items: center;
  flex-shrink: 0;
}
.back-btn {
  display: none;
  background: none;
  border: none;
  font-size: 14px;
  color: var(--gray);
  cursor: pointer;
  margin-right: 12px;
  padding: 5px;
  font-family: inherit;
}
.back-btn:hover { color: var(--forest); }
.dc-name {
  font-size: 16px;
  font-weight: 500;
  color: var(--dark);
}
.dc-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

/* Profile card */
.profile-card {
  background: var(--white);
  border-radius: 14px;
  padding: 18px;
  border: 0.5px solid rgba(15,46,40,.08);
}
.pc-top {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
}
.pc-av {
  width: 52px; height: 52px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; font-weight: 500;
  flex-shrink: 0;
}
.pc-name { font-size: 17px; font-weight: 500; color: var(--dark); margin-bottom: 2px; }
.pc-sub { font-size: 12px; color: var(--gray); }
.pc-badge {
  margin-left: auto;
  font-size: 11px;
  padding: 5px 12px;
  border-radius: 10px;
  font-weight: 500;
  flex-shrink: 0;
  align-self: flex-start;
  text-align: center;
}
.stats-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
.sm-box {
  background: var(--linen);
  border-radius: 10px;
  padding: 12px 10px;
  text-align: center;
  border: 0.5px solid rgba(15,46,40,.06);
}
.sm-val { font-size: 20px; font-weight: 500; color: var(--dark); line-height: 1; }
.sm-lbl { font-size: 10px; color: var(--gray); text-transform: uppercase; letter-spacing: .08em; margin-top: 4px; }

/* Sections / Widgets */
.sec-label {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--gray);
  margin-bottom: 12px;
}
.widget {
  background: var(--white);
  border-radius: 14px;
  padding: 18px;
  border: 0.5px solid rgba(15,46,40,.08);
}

/* Info Items (Biometrics / Lifestyle) */
.info-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}
.info-item {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.info-lbl { font-size: 11px; color: var(--gray); }
.info-val { font-size: 13px; font-weight: 500; color: var(--dark); }

/* Tags (Allergies / History / Preferences) */
.tag-row { display: flex; flex-wrap: wrap; gap: 6px; }
.atag {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 12px;
  padding: 5px 12px;
  border-radius: 20px;
  font-weight: 500;
}
.at-red  { background: var(--redl); color: #712B13; }
.at-warn { background: var(--saffl); color: #633806; }
.at-ok   { background: var(--mintl); color: #085041; }
.at-hist { background: var(--linen); color: var(--dark); border: 1px solid rgba(15,46,40,.08); }
.at-pref { background: var(--purpll); color: #3C3489; }

/* Macro bars */
.macro-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
}
.macro-row:last-child { margin-bottom: 0; }
.ml { font-size: 12px; color: var(--gray); width: 88px; flex-shrink: 0; }
.mb { flex: 1; height: 5px; background: rgba(15,46,40,.08); border-radius: 3px; overflow: hidden; }
.mf { height: 100%; border-radius: 3px; }
.mv { font-size: 12px; font-weight: 500; color: var(--dark); width: 36px; text-align: right; }

/* Plan rows */
.plan-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 12px;
  background: var(--linen);
  border-radius: 10px;
  margin-bottom: 8px;
  border: 0.5px solid rgba(15,46,40,.08);
  cursor: pointer;
  transition: border-color .15s;
}
.plan-row:hover { border-color: var(--sage); }
.plan-row:last-child { margin-bottom: 0; }
.pr-icon {
  width: 34px; height: 34px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  font-size: 14px;
}
.pr-info { flex: 1; min-width: 0; }
.pr-title { font-size: 13px; font-weight: 500; color: var(--dark); margin-bottom: 1px; }
.pr-sub { font-size: 11px; color: var(--gray); }
.pr-badge {
  font-size: 10px;
  padding: 3px 9px;
  border-radius: 20px;
  font-weight: 500;
  flex-shrink: 0;
}

/* Note */
.note-box {
  background: var(--linen);
  border-radius: 10px;
  padding: 14px;
  border-left: 2.5px solid var(--sage);
  font-size: 13px;
  color: var(--dark);
  line-height: 1.65;
}
.note-meta { font-size: 11px; color: var(--gray); margin-top: 8px; }

/* Chef */
.chef-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 14px;
  background: var(--linen);
  border-radius: 10px;
  border: 0.5px solid rgba(15,46,40,.08);
  font-size: 13px;
  color: var(--dark);
}
.chef-ico {
  width: 16px; height: 16px;
  border: 1.5px solid var(--sage);
  border-radius: 3px;
  flex-shrink: 0;
}

/* Action row */
.action-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.act-btn {
  padding: 13px 10px;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid rgba(15,46,40,.14);
  background: var(--white);
  color: var(--dark);
  font-family: inherit;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  transition: all .15s;
}
.act-btn:hover { border-color: var(--sage); color: var(--sage); }
.act-ico {
  width: 14px; height: 14px;
  border: 1.5px solid currentColor;
  border-radius: 2px;
  flex-shrink: 0;
}
.arr { font-size: 11px; }

/* ─── RESPONSIVITATE (MEDIA QUERIES) ─── */
@media (max-width: 1024px) {
  .app { grid-template-columns: 80px 320px 1fr; }
  .sb-logo { padding: 20px 10px; justify-content: center;}
  .sb-logo span { display: none; }
  .sb-section { display: none; }
  .sb-item { padding: 14px; justify-content: center; border-left: none; border-bottom: 2px solid transparent;}
  .sb-item.active { border-bottom-color: var(--sage); border-left-color: transparent;}
  .sb-item text { display: none; } 
  .sb-icon { margin: 0; transform: scale(1.2);}
  .sb-badge { display: none; }
  .sb-user { padding: 16px 0; justify-content: center; }
  .sb-uname, .sb-urole { display: none; }
}

@media (max-width: 768px) {
  .app { 
    display: flex; 
    flex-direction: column; 
    height: 100vh;
  }
  
  .sidebar { 
    position: fixed; top: 0; left: -260px; width: 260px; height: 100vh;
    padding: 0; box-shadow: 2px 0 10px rgba(0,0,0,0.1);
  }
  .sidebar.open { transform: translateX(260px); }
  .sb-logo { padding: 20px; justify-content: space-between;}
  .sb-logo span { display: inline; }
  .close-menu { display: block; }
  .sb-section { display: block; }
  .sb-item { padding: 12px 20px; justify-content: flex-start; border-left: 3px solid transparent; border-bottom: none;}
  .sb-item.active { border-left-color: var(--sage); border-bottom-color: transparent;}
  .sb-item text { display: inline; }
  .sb-icon { margin-right: 12px; transform: scale(1);}
  .sb-badge { display: inline-block; }
  .sb-user { padding: 16px 20px; justify-content: flex-start; }
  .sb-uname, .sb-urole { display: block; }

  .mobile-topbar { display: flex; }
  
  .list-col { 
    flex: 1; 
    width: 100%;
    border-right: none;
  }
  .lc-header { padding: 16px; }

  .detail-col {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100vh;
    z-index: 30;
    transform: translateX(100%); 
  }
  .detail-col.open {
    transform: translateX(0); 
  }
  .dc-topbar { padding: 0 16px; }
  .back-btn { display: inline-block; }
  .action-row { grid-template-columns: 1fr; } 
}
</style>
</head>
<body>
<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="app">

  <!-- TOPBAR MOBIL -->
  <div class="mobile-topbar">
    <button class="menu-toggle" onclick="toggleMenu()">☰</button>
    <div class="mobile-topbar-title">Clienții mei</div>
    <div style="width: 24px;"></div> <!-- Spacer -->
  </div>

  <!-- ─── SIDEBAR ─── -->
  <div class="sidebar" id="sidebar">
    <div class="sb-logo">
      <div>Noura<span>.</span></div>
      <button class="close-menu" onclick="toggleMenu()">×</button>
    </div>
    <div class="sb-nav">
      <div class="sb-section">Principal</div>
      <div class="sb-item" onclick="window.location.href='dashboard.html'"><div class="sb-icon"></div> <text>Dashboard</text></div>
      <div class="sb-item active"><div class="sb-icon"></div> <text>Clienți</text></div>
      <div class="sb-item" onclick="window.location.href='plan.html'"><div class="sb-icon"></div> <text>Planuri</text></div>
      <div class="sb-item"><div class="sb-icon"></div> <text>Rețete</text></div>
      <div class="sb-section">Analiză</div>
      <div class="sb-item"><div class="sb-icon"></div> <text>Analytics</text></div>
      <div class="sb-item"><div class="sb-icon"></div> <text>Rapoarte</text></div>
      <div class="sb-section">Echipă</div>
      <div class="sb-item"><div class="sb-icon"></div> <text>Colaborare</text> <span class="sb-badge">3</span></div>
      <div class="sb-item"><div class="sb-icon"></div> <text>Setări</text></div>
    </div>
    <div class="sb-user">
      <div class="sb-av" id="sidebarInitial">AM</div>
      <div>
        <div class="sb-uname" id="sidebarName">Dr. Alina M.</div>
        <div class="sb-urole" id="sidebarRole">nutriționist</div>
      </div>
    </div>
  </div>

  <!-- ─── LIST ─── -->
  <div class="list-col">
    <div class="lc-header">
      <div class="lc-toprow">
        <div class="lc-title">Clienții mei <span>(23)</span></div>
        <button class="btn-new">
          <div class="ico"></div>
          Nou
          <span class="arr">↗</span>
        </button>
      </div>
      <div class="search-wrap">
        <span class="search-ico">🔍</span>
        <input class="search-in" type="text" placeholder="Caută client..." oninput="searchClients(this.value)">
      </div>
      <div class="filter-row">
        <div class="fp on" onclick="setFilter('toti',this)">Toți</div>
        <div class="fp" onclick="setFilter('ok',this)">Pe plan</div>
        <div class="fp" onclick="setFilter('atentie',this)">Atenție</div>
        <div class="fp" onclick="setFilter('nou',this)">Noi</div>
        <div class="fp" onclick="setFilter('expirat',this)">Expirat</div>
      </div>
    </div>
    <div class="clients-list" id="clientsList"></div>
  </div>

  <!-- ─── DETAIL ─── -->
  <div class="detail-col" id="detailPanel">
    <div class="dc-topbar">
      <button class="back-btn" onclick="closeDetails()">← Înapoi la listă</button>
      <div class="dc-name" id="detailTitle">Andrei Moldovan</div>
    </div>
    <div class="dc-scroll" id="detailScroll"></div>
  </div>

</div>

<script>
// Sincronizare cu datele din Onboarding (LocalStorage)
document.addEventListener('DOMContentLoaded', () => {
  const fname = localStorage.getItem('noura_user_fname');
  const lname = localStorage.getItem('noura_user_lname');
  const role = localStorage.getItem('noura_user_role');
  const initials = localStorage.getItem('noura_user_initials');

  if (fname) {
    document.getElementById('sidebarName').textContent = `${fname} ${lname}`;
    if(role) document.getElementById('sidebarRole').textContent = role;
    if(initials) document.getElementById('sidebarInitial').textContent = initials;
  }
});

// Logică meniu mobil
function toggleMenu() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').style.display = 
    document.getElementById('sidebar').classList.contains('open') ? 'block' : 'none';
}

function closeDetails() {
  document.getElementById('detailPanel').classList.remove('open');
}

// Baza de date completă clienți

let activeFilter = 'toti';
let selectedId = 1;

function renderList(filter='toti', search='') {
  let list = clients;
  if (filter !== 'toti') list = list.filter(c => c.filter === filter);
  if (search) list = list.filter(c => c.name.toLowerCase().includes(search.toLowerCase()));

  const el = document.getElementById('clientsList');
  el.innerHTML = list.map(c => `
    <div class="ci ${selectedId === c.id ? 'selected' : ''}" onclick="selectClient(${c.id})">
      <div class="ci-av" style="background:${c.avBg};color:${c.avColor};">${c.initials}</div>
      <div class="ci-info">
        <div class="ci-name">${c.name}</div>
        <div class="ci-meta">${c.meta}</div>
      </div>
      <div class="ci-right">
        <div class="ci-badge ${c.badgeCls}">${c.badge}</div>
        <div class="ci-bar-wrap">
          <div class="ci-bar-bg"><div class="ci-bar-fill" style="width:${c.pct}%;background:${c.barColor};"></div></div>
          <div class="ci-pct">${c.pct}%</div>
        </div>
      </div>
    </div>
  `).join('') + `<div class="more-row">+ 18 clienți suplimentari</div>`;
}

function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.fp').forEach(p => p.classList.remove('on'));
  btn.classList.add('on');
  renderList(f, document.querySelector('.search-in').value);
}

function searchClients(val) {
  renderList(activeFilter, val);
}

function selectClient(id) {
  selectedId = id;
  renderList(activeFilter, document.querySelector('.search-in').value);
  const c = clients.find(x => x.id === id);
  document.getElementById('detailTitle').textContent = c.name;
  renderDetail(c);
  
  // Pe mobil, glisează panoul de detalii la vedere
  if(window.innerWidth <= 768) {
    document.getElementById('detailPanel').classList.add('open');
  }
}

function renderDetail(c) {
  document.getElementById('detailScroll').innerHTML = `
    <!-- Profile card -->
    <div class="profile-card">
      <div class="pc-top">
        <div class="pc-av" style="background:${c.avBg};color:${c.avColor};">${c.initials}</div>
        <div>
          <div class="pc-name">${c.name}</div>
          <div class="pc-sub">${c.age} ani · ${c.weight}kg · ${c.goal}</div>
        </div>
        <div class="pc-badge ${c.badgeCls}" style="line-height:1.3;">${c.badge}</div>
      </div>
      <div class="stats-3">
        ${c.stats.map(s => `
          <div class="sm-box">
            <div class="sm-val">${s.v}</div>
            <div class="sm-lbl">${s.l}</div>
          </div>
        `).join('')}
      </div>
    </div>
    
    <!-- Date Biometrice & Metabolice NOU -->
    <div class="widget">
      <div class="sec-label">Date Biometrice & Metabolice</div>
      <div class="info-grid">
        <div class="info-item"><span class="info-lbl">Înălțime</span><span class="info-val">${c.height} cm</span></div>
        <div class="info-item"><span class="info-lbl">IMC</span><span class="info-val">${c.bmi}</span></div>
        <div class="info-item"><span class="info-lbl">Body Fat</span><span class="info-val">${c.bodyFat}%</span></div>
        <div class="info-item"><span class="info-lbl">Metabolism (BMR)</span><span class="info-val">${c.bmr} kcal</span></div>
