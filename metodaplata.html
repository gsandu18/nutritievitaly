<body class="bg-background text-on-background min-h-screen pb-xl">
<!-- TopAppBar -->
<header class="bg-surface dark:bg-surface-dim shadow-sm w-full top-0 sticky z-50">
<div class="flex items-center justify-between px-margin-mobile md:px-margin-desktop h-16 w-full max-w-7xl mx-auto">
<div class="flex items-center">
<button aria-label="Înapoi" class="p-2 -ml-2 rounded-full hover:bg-surface-container-high transition-colors active:scale-95 text-primary dark:text-primary-fixed-dim">
<span class="material-symbols-outlined text-[24px]">arrow_back</span>
</button>
</div>
<h1 class="font-headline-md text-headline-md text-primary dark:text-primary-fixed-dim absolute left-1/2 transform -translate-x-1/2">
                Metode de Plată
            </h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</div>
</header>
<main class="max-w-3xl mx-auto px-margin-mobile md:px-margin-desktop py-md space-y-md">
<!-- Saved Cards Section -->
<section>
<h2 class="font-headline-sm text-on-surface mb-sm px-2">Carduri Salvate</h2>
<div class="space-y-base">
<!-- Card 1 (Default) -->
<div class="bg-surface-container-lowest rounded-lg p-sm flex items-center justify-between shadow-[0_4px_20px_0_rgba(0,0,0,0.04)] border border-surface-variant hover:shadow-[0_8px_24px_0_rgba(0,0,0,0.08)] transition-shadow">
<div class="flex items-center space-x-sm">
<div class="w-12 h-8 bg-surface-container rounded flex items-center justify-center">
<span class="font-label-md text-primary font-bold italic">VISA</span>
</div>
<div>
<p class="font-body-md text-on-surface">•••• 4242</p>
<p class="font-label-sm text-on-surface-variant">Expira 12/25</p>
</div>
</div>
<div class="flex flex-col items-end space-y-1">
<span class="bg-primary-container text-on-primary-container font-label-sm px-2 py-0.5 rounded-full">Implicit</span>
<button aria-label="Șterge card" class="text-error hover:bg-error-container p-1 rounded transition-colors">
<span class="material-symbols-outlined text-[20px]">delete</span>
</button>
</div>
</div>
<!-- Card 2 -->
<div class="bg-surface-container-lowest rounded-lg p-sm flex items-center justify-between shadow-[0_4px_20px_0_rgba(0,0,0,0.04)] border border-surface-variant hover:shadow-[0_8px_24px_0_rgba(0,0,0,0.08)] transition-shadow">
<div class="flex items-center space-x-sm">
<div class="w-12 h-8 bg-surface-container rounded flex items-center justify-center">
<span class="font-label-md text-[#eb001b] font-bold">MC</span>
</div>
<div>
<p class="font-body-md text-on-surface">•••• 8899</p>
<p class="font-label-sm text-on-surface-variant">Expira 08/26</p>
</div>
</div>
<div class="flex flex-col items-end space-y-1">
<button class="text-on-surface-variant font-label-sm hover:text-primary transition-colors">Setează implicit</button>
</div>
</div>
</div>
</section>
<!-- Other Methods Section -->
<section>
<h2 class="font-headline-sm text-on-surface mb-sm px-2 mt-lg">Alte Opțiuni</h2>
<div class="space-y-base">
<!-- Apple Pay -->
<button class="w-full bg-surface-container-lowest rounded-lg p-sm flex items-center justify-between shadow-[0_4px_20px_0_rgba(0,0,0,0.04)] border border-surface-variant hover:bg-surface-container-low transition-colors">
<div class="flex items-center space-x-sm">
<div class="w-10 h-10 bg-black rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-white text-[20px]" style="font-variation-settings: 'FILL' 1;">apps</span>
</div>
<p class="font-body-md text-on-surface font-medium">Apple Pay</p>
</div>
<span class="material-symbols-outlined text-on-surface-variant">chevron_right</span>
</button>
<!-- Google Pay -->
<button class="w-full bg-surface-container-lowest rounded-lg p-sm flex items-center justify-between shadow-[0_4px_20px_0_rgba(0,0,0,0.04)] border border-surface-variant hover:bg-surface-container-low transition-colors">
<div class="flex items-center space-x-sm">
<div class="w-10 h-10 bg-white border border-surface-variant rounded-full flex items-center justify-center">
<span class="font-label-md font-bold text-gray-700">G Pay</span>
</div>
<p class="font-body-md text-on-surface font-medium">Google Pay</p>
</div>
<span class="material-symbols-outlined text-on-surface-variant">chevron_right</span>
</button>
</div>
</section>
<!-- Add New Action -->
<div class="mt-lg pt-md border-t border-surface-variant">
<button class="w-full h-12 bg-primary text-on-primary rounded-lg font-label-md flex items-center justify-center space-x-2 hover:bg-surface-tint shadow-sm transition-colors active:scale-[0.98]">
<span class="material-symbols-outlined">add</span>
<span>Adaugă metodă nouă</span>
</button>
</div>
