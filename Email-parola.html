<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Resetare Parolă - Vitality</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-primary": "#ffffff",
                        "surface": "#fbf9f9",
                        "primary-container": "#4caf50",
                        "outline-variant": "#becab9",
                        "outline": "#6f7a6b",
                        "inverse-on-surface": "#f2f0f0",
                        "primary": "#006e1c",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-low": "#f5f3f3",
                        "on-surface": "#1b1c1c",
                        "on-surface-variant": "#3f4a3c",
                        "on-primary-container": "#003c0b"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem"
                    },
                    "fontFamily": {
                        "headline-lg": ["Inter"],
                        "body-md": ["Inter"],
                        "label-md": ["Inter"],
                        "label-sm": ["Inter"]
                    }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: theme('colors.surface');
            color: theme('colors.on-surface');
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 md:p-12 bg-surface">

    <main class="w-full max-w-md bg-surface-container-lowest rounded-xl shadow-[0px_4px_20px_0px_rgba(0,0,0,0.04)] border border-outline-variant/30 p-8 text-center">
        <div class="mb-6 flex justify-center">
            <div class="w-24 h-24 rounded-full bg-primary-container flex items-center justify-center shadow-sm">
                <span class="material-symbols-outlined text-4xl text-on-primary-container">
                    lock_reset
                </span>
            </div>
        </div>

        <h1 class="text-2xl md:text-3xl font-bold text-on-surface mb-2">
            Ai uitat parola?
        </h1>
        <p class="text-base text-on-surface-variant mb-8">
            Introdu adresa de email asociată contului tău și îți vom trimite un link pentru a-ți seta o nouă parolă.
        </p>

        <form id="reset-form" class="flex flex-col gap-4 text-left">
            <div class="flex flex-col gap-1">
                <label for="email-reset" class="text-sm font-medium text-on-surface-variant ml-1">Adresă de Email</label>
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant">mail</span>
                    <input id="email-reset" type="email" required placeholder="exemplu@adresa.ro" class="w-full h-12 pl-12 pr-4 rounded-lg bg-surface-container-low border border-transparent focus:bg-surface-container-lowest focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all duration-200 text-base text-on-surface placeholder:text-outline" />
                </div>
            </div>

            <button type="submit" class="w-full h-12 mt-4 flex items-center justify-center rounded-lg bg-primary text-on-primary font-semibold text-sm hover:bg-[#005313] transition-colors active:scale-95 shadow-sm">
                Trimite Link de Resetare
            </button>
        </form>

        <div class="mt-8 text-center">
            <a href="index.html" class="text-sm font-semibold text-primary hover:underline transition-colors">
                Înapoi la Logare
            </a>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getAuth, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";

        // Datele tale Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyDmKC06ObRWWvod2TYJUvEM-ULKrztw7Ts",
            authDomain: "app-vitality.firebaseapp.com",
            projectId: "app-vitality",
            storageBucket: "app-vitality.firebasestorage.app",
            messagingSenderId: "360982822240",
            appId: "1:360982822240:web:a650b9289aabd9de80f205",
            measurementId: "G-T8D7CTP5ZK"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Declanșăm acțiunea când se apasă pe buton
        document.getElementById('reset-form').addEventListener('submit', (e) => {
            e.preventDefault(); 
            const email = document.getElementById('email-reset').value;

            // Trimitem emailul via Firebase
            sendPasswordResetEmail(auth, email)
                .then(() => {
                    // Dacă s-a trimis cu succes, mutăm utilizatorul pe pagina de confirmare pe care ai făcut-o anterior
                    window.location.href = "email-trimis.html"; 
                })
                .catch((error) => {
                    const errorCode = error.code;
                    if (errorCode === 'auth/user-not-found') {
                        alert("Nu există niciun cont asociat cu acest email.");
                    } else if (errorCode === 'auth/invalid-email') {
                        alert("Te rugăm să introduci o adresă de email validă.");
                    } else {
                        alert("A apărut o eroare: " + error.message);
                    }
                });
        });
    </script>
</body>
</html>
