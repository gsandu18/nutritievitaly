        </p>
<!-- Actions Container -->
<div class="w-full flex flex-col items-start gap-xs mb-lg text-left">
<label class="font-label-md text-label-md text-on-surface" for="cancellation-reason">Motivul anulării <span class="text-error">*</span></label>
<textarea class="w-full p-sm bg-surface rounded-lg border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/50 resize-none invalid:border-error invalid:ring-error" id="cancellation-reason" placeholder="Ex: Clientul a solicitat reprogramarea prin telefon..." required="true" rows="3"></textarea><p class="text-error text-label-sm mt-1">Acest cmp este obligatoriu. </p>
</div><div class="flex flex-col w-full gap-sm">
