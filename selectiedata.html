<!DOCTYPE html>

<style>
      body {
        font-family: 'Inter', sans-serif;
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background text-on-background antialiased min-h-screen flex flex-col items-center">
<div class="w-full max-w-[1280px] bg-surface min-h-screen relative shadow-sm mx-auto md:border-x md:border-outline-variant/30">
<!-- TopAppBar (Transactional - Hidden Nav Shell Logic) -->
<header class="bg-surface border-b border-outline-variant shadow-sm docked full-width top-0 z-50 flex justify-between items-center w-full px-margin-mobile h-16 sticky top-0">
<button class="p-2 -ml-2 text-on-surface-variant hover:bg-surface-container-low transition-colors rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
</button>
<h1 class="text-headline-md font-headline-md font-bold text-primary flex-1 text-center truncate px-4">
                Selectează Data și Ora
            </h1>
<button class="p-2 -mr-2 text-on-surface-variant hover:bg-surface-container-low transition-colors rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">more_vert</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 px-margin-mobile py-md flex flex-col gap-xl pb-32 max-w-2xl mx-auto w-full">
<!-- Calendar Section -->
<section class="flex flex-col gap-md">
<div class="bg-surface-container-lowest rounded-xl shadow-[0_4px_20px_0_rgba(0,0,0,0.04)] border border-outline-variant/50 p-sm md:p-md">
<!-- Calendar Header -->
<div class="flex items-center justify-between mb-sm">
<button class="p-2 text-on-surface-variant hover:bg-surface-container-low rounded-full transition-colors">
<span class="material-symbols-outlined">chevron_left</span>
</button>
<h2 class="text-body-lg font-body-lg font-semibold">Octombrie 2023</h2>
<button class="p-2 text-on-surface-variant hover:bg-surface-container-low rounded-full transition-colors">
<span class="material-symbols-outlined">chevron_right</span>
</button>
</div>
<!-- Days of Week -->
<div class="grid grid-cols-7 gap-xs mb-xs text-center text-label-sm font-label-sm text-on-surface-variant">
<div>L</div><div>M</div><div>M</div><div>J</div><div>V</div><div>S</div><div>D</div>
</div>
<!-- Calendar Grid (Simplified) -->
<div class="grid grid-cols-7 gap-xs text-center text-body-md font-body-md">
<!-- Empty slots -->
<div class="p-2 text-surface-dim"></div>
<div class="p-2 text-surface-dim"></div>
<!-- Dates -->
<button class="p-2 rounded-full hover:bg-surface-container-low transition-colors">1</button>
<button class="p-2 rounded-full hover:bg-surface-container-low transition-colors">2</button>
<button class="p-2 rounded-full hover:bg-surface-container-low transition-colors">3</button>
<button class="p-2 rounded-full hover:bg-surface-container-low transition-colors">4</button>
<button class="p-2 rounded-full hover:bg-surface-container-low transition-colors">5</button>
<button class="p-2 rounded-full hover:bg-surface-container-low transition-colors">6</button>
<button class="p-2 rounded-full hover:bg-surface-container-low transition-colors">7</button>
<button class="p-2 rounded-full hover:bg-surface-container-low transition-colors">8</button>
<button class="p-2 rounded-full hover:bg-surface-container-low transition-colors text-primary font-semibold">9</button> <!-- Today -->
<button class="p-2 rounded-full hover:bg-surface-container-low transition-colors">10</button>
<button class="p-2 rounded-full hover:bg-surface-container-low transition-colors">11</button>
<!-- Selected Date -->
<button class="p-2 rounded-full bg-primary-container text-on-primary-container font-semibold shadow-sm hover:opacity-90 transition-opacity">12</button>
<button class="p-2 rounded-full hover:bg-surface-container-low transition-colors">13</button>
<button class="p-2 rounded-full hover:bg-surface-container-low transition-colors">14</button>
<button class="p-2 rounded-full hover:bg-surface-container-low transition-colors">15</button>
<!-- ... rest of month implied ... -->
<button class="p-2 rounded-full text-surface-dim pointer-events-none">16</button>
<button class="p-2 rounded-full text-surface-dim pointer-events-none">17</button>
<button class="p-2 rounded-full text-surface-dim pointer-events-none">18</button>
<button class="p-2 rounded-full text-surface-dim pointer-events-none">19</button>
</div>
</div>
</section>
<!-- Time Slots Section -->
<section class="flex flex-col gap-md">
<h3 class="text-headline-md font-headline-md text-on-surface">Selectează Ora</h3>
<div class="flex flex-col gap-sm">
<!-- Morning -->
<div>
<h4 class="text-label-md font-label-md text-on-surface-variant mb-xs">DIMINEAȚĂ</h4>
<div class="grid grid-cols-3 gap-sm">
<button class="py-sm px-4 rounded-lg border border-outline-variant text-body-md font-body-md hover:bg-surface-container-low transition-colors text-on-surface">09:00</button>
<button class="py-sm px-4 rounded-lg border border-outline-variant text-body-md font-body-md hover:bg-surface-container-low transition-colors text-on-surface">10:00</button>
<button class="py-sm px-4 rounded-lg border border-outline-variant text-body-md font-body-md hover:bg-surface-container-low transition-colors text-on-surface">11:00</button>
</div>
</div>
<!-- Lunch -->
<div>
<h4 class="text-label-md font-label-md text-on-surface-variant mb-xs">PRÂNZ</h4>
<div class="grid grid-cols-3 gap-sm">
<!-- Selected Time -->
<button class="py-sm px-4 rounded-lg bg-primary-container border border-primary text-on-primary-container text-body-md font-body-md font-medium shadow-sm hover:opacity-90 transition-opacity">13:00</button>
<button class="py-sm px-4 rounded-lg border border-outline-variant text-body-md font-body-md hover:bg-surface-container-low transition-colors text-on-surface">14:00</button>
<button class="py-sm px-4 rounded-lg border border-outline-variant text-body-md font-body-md hover:bg-surface-container-low transition-colors text-on-surface">15:00</button>
</div>
</div>
<!-- Evening -->
<div>
<h4 class="text-label-md font-label-md text-on-surface-variant mb-xs">SEARĂ</h4>
<div class="grid grid-cols-3 gap-sm">
<button class="py-sm px-4 rounded-lg border border-outline-variant text-body-md font-body-md hover:bg-surface-container-low transition-colors text-on-surface">18:00</button>
<button class="py-sm px-4 rounded-lg border border-outline-variant text-body-md font-body-md hover:bg-surface-container-low transition-colors text-on-surface">19:00</button>
<button class="py-sm px-4 rounded-lg border border-outline-variant text-body-md font-body-md hover:bg-surface-container-low transition-colors text-on-surface">20:00</button>
</div>
</div>
</div>
</section>
<!-- Summary Card -->
<section class="flex flex-col gap-md">
<h3 class="text-headline-md font-headline-md text-on-surface">NOTĂ PENTRU BUCĂTAR</h3>
<div class="bg-surface-container-lowest rounded-xl shadow-[0_4px_20px_0_rgba(0,0,0,0.04)] border border-outline-variant/50 p-md flex flex-col gap-sm">
<p class="text-body-md font-body-md text-on-surface-variant">
            Spune-i bucătarului detalii importante despre masa ta.
        </p>
<textarea class="w-full p-md rounded-lg border border-outline-variant bg-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all text-body-md min-h-[120px] resize-none" placeholder="Ex: Alergii, preferințe la condimente, instrucțiuni acces..."></textarea>
</div>
</section><section class="mt-auto pt-md">
<div class="bg-surface-container-lowest rounded-xl shadow-[0_4px_20px_0_rgba(0,0,0,0.04)] border border-outline-variant/50 p-md flex flex-col gap-sm">
<div class="flex items-start gap-sm">
<div class="p-2 bg-secondary-container rounded-full text-on-secondary-container flex items-center justify-center">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">calendar_today</span>
</div>
<div class="flex flex-col">
<span class="text-label-md font-label-md text-on-surface-variant">Rezervare</span>
<span class="text-body-lg font-body-lg font-medium text-on-surface">Joi, 12 Octombrie la 13:00</span>
</div>
</div>
<div class="w-full h-px bg-outline-variant/30 my-xs"></div>
<div class="flex justify-between items-center">
<span class="text-body-md font-body-md text-on-surface-variant">Estimare Preț</span>
<span class="text-headline-md font-headline-md font-bold text-primary">250 RON</span>
</div>
</div>
</section>
</main>
<!-- Bottom Action Area -->
<div class="fixed bottom-0 left-0 w-full bg-surface/80 backdrop-blur-md border-t border-outline-variant/30 px-margin-mobile py-sm pb-safe z-40 max-w-[1280px] mx-auto md:static md:bg-transparent md:border-none md:pb-xl">
<button class="w-full h-12 bg-primary text-on-primary rounded-full text-label-md font-label-md hover:opacity-90 transition-opacity shadow-md flex items-center justify-center">
                Confirmă Rezervarea
            </button>
</div>
</div>
