<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Setează Parolă Nouă - Vitality</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#356b3b", // Culoarea verde din imagine
                        surface: "#f8f9fa",
                        "surface-container": "#f1f3f4",
                        "on-surface": "#202124",
                        "on-surface-variant": "#5f6368"
                    }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { background-color: #f1f3f4; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <h1 class="text-3xl font-bold text-primary mb-6">Vitality</h1>

    <main class="w-full max-w-[420px] bg-white rounded-2xl shadow-lg border border-gray-100 p-8">
        
        <div class="text-center mb-8">
            <h2 class="text-2xl font-bold text-on-surface mb-2">Setează Parolă Nouă</h2>
            <p class="text-sm text-on-surface-variant">
                Introdu noua ta parolă mai jos pentru a-ți asigura accesul.
            </p>
        </div>

        <form id="new-password-form" class="flex flex-col gap-5">
            <div class="flex flex-col gap-1">
                <label class="text-sm font-semibold text-on-surface">Parolă Nouă</label>
                <div class="relative">
                    <input id="new-password" type="password" required placeholder="••••••••" class="w-full h-12 px-4 rounded-lg bg-surface-container border border-transparent focus:bg-white focus:border-primary outline-none transition-all duration-200" />
                    <button type="button" class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant" onclick="togglePassword('new-password')">
                        <span class="material-symbols-outlined">visibility_off</span>
                    </button>
                </div>
            </div>

            <div class="flex flex-col gap-1">
                <label class="text-sm font-semibold text-on-surface">Confirmă Parolă</label>
                <div class="relative">
                    <input id="confirm-password" type="password" required placeholder="••••••••" class="w-full h-12 px-4 rounded-lg bg-surface-container border border-transparent focus:bg-white focus:border-primary outline-none transition-all duration-200" />
                    <button type="button" class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant" onclick="togglePassword('confirm-password')">
                        <span class="material-symbols-outlined">visibility_off</span>
                    </button>
                </div>
            </div>

            <div class="bg-surface-container rounded-lg p-4 mt-1">
                <p class="text-sm font-semibold text-on-surface mb-2">Cerințe parolă:</p>
                <ul class="text-xs text-on-surface-variant space-y-2">
                    <li class="flex items-center gap-2"><span class="material-symbols-outlined text-[16px]">radio_button_unchecked</span> Minim 8 caractere</li>
                    <li class="flex items-center gap-2"><span class="material-symbols-outlined text-[16px]">radio_button_unchecked</span> Cel puțin o cifră</li>
                    <li class="flex items-center gap-2"><span class="material-symbols-outlined text-[16px]">radio_button_unchecked</span> Cel puțin o literă mare</li>
                </ul>
            </div>

            <button type="submit" class="w-full h-12 mt-2 rounded-lg bg-primary text-white font-semibold hover:bg-opacity-90 transition-all active:scale-95 shadow-sm">
                Salvează Parola
            </button>
        </form>

        <div class="mt-6 text-center">
            <a href="index.html" class="text-sm font-medium text-primary hover:underline">Înapoi la autentificare</a>
        </div>
    </main>

    <script>
        function togglePassword(fieldId) {
            const input = document.getElementById(fieldId);
            const icon = input.nextElementSibling.querySelector('span');
            if (input.type === "password") {
                input.type = "text";
                icon.textContent = "visibility";
            } else {
                input.type = "password";
                icon.textContent = "visibility_off";
            }
        }
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getAuth, confirmPasswordReset } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDmKC06ObRWWvod2TYJUvEM-ULKrztw7Ts",
            authDomain: "app-vitality.firebaseapp.com",
            projectId: "app-vitality",
            storageBucket: "app-vitality.firebasestorage.app",
            messagingSenderId: "360982822240",
            appId: "1:360982822240:web:a650b9289aabd9de80f205"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Preia codul secret (oobCode) din link-ul de pe email
        const urlParams = new URLSearchParams(window.location.search);
        const actionCode = urlParams.get('oobCode');

        document.getElementById('new-password-form').addEventListener('submit', (e) => {
            e.preventDefault();

            if (!actionCode) {
                alert("Link invalid sau expirat. Te rugăm să soliciți o nouă resetare a parolei.");
                return;
            }

            const newPass = document.getElementById('new-password').value;
            const confirmPass = document.getElementById('confirm-password').value;

            // Validare de bază
            if (newPass !== confirmPass) {
                alert("Parolele nu coincid!");
                return;
            }
            if (newPass.length < 8) {
                alert("Parola trebuie să aibă minim 8 caractere.");
                return;
            }

            // Trimitem noua parolă la Firebase
            confirmPasswordReset(auth, actionCode, newPass)
                .then(() => {
                    alert("Parola a fost modificată cu succes! Te poți loga cu noua parolă.");
                    window.location.href = "index.html"; // Redirecționare spre login
                })
                .catch((error) => {
                    alert("Eroare la resetarea parolei: " + error.message + " Posibil ca link-ul să fi expirat.");
                });
        });
    </script>
</body>
</html>
